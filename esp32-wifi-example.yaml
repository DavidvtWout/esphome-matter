esphome:
  name: matter-device
  friendly_name: Matter Device

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source: github://DavidvtWout/esphome-matter@main
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG

api:

ota:
  platform: esphome

matter:
  # 12-bit value (0–4095) used to filter devices during discovery.
  discriminator: 3840
  # Setup code entered or scanned during commissioning. Must not be a trivially
  # guessable sequence (e.g. 11111111). See Matter spec section 5.1.7.1.
  passcode: 20202021
  # 0xFFF1 is the CSA test vendor ID — fine for development, needs a real VID for production.
  vendor_id: 0xFFF1
  product_id: 0x8001
